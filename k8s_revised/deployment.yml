kind: Deployment
apiVersion: apps/v1
metadata:
  name: nginx-deployment
  labesls:
    app: nginx
  namespace: nginx
spec:
  replicas: 2
  selector:
    matchLalels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
      image: nginx:latest
      ports:
      - containerPort: 80