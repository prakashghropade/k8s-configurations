kind: StatefulSet
apiVersion: apps/v1
metadata:
  name: mysql-statefulset
  namespace:  mysql
spec:
  serviceName: 
  replicas: 3
  selector:
    matchLabels:
      app: mysql
    templates:
      metadata:
        labels:
          app: mysql
      spec:
        containers:
        - name: mysql
          image: mysql:latest
          ports:
          - containerPort: 3306
            name: mysql
          env:
          - name: MYSQL_ROOT_PASSWORD
            value: password
          - name:  MYSQL_DATABASE
            value: devops
          volumeMounts:
          - name: mysql-data
            mountPath: /var/lib/mysql
  volumeClaimTemplates:
  - metadata:
      name: mysql-data
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 1Gi
        


