kind: ReplicaSet
apiVersion: v1
metadata:
  name: nginx-replicaset
  namespace: nginx
  labels:
    app: nginx-replicaset
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx-replicaset
  template:
    metadata:
      labels:
        app: nginx-replicaset
    spec:
      containers:
      - name: nginx-container
        image: nginx:latest
        ports:
        - containerPort: 80