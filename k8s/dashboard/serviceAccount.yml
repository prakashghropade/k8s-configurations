kind: ServiceAccount
apiVersion: v1
metadata:
  name: admin-user
  namespace: kubernnetes-dashboard

---

kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: admin-user-binding
subjects:
- kind: ServiceAccount
  name: admin-user
  apiGroup: rbac.authorization.k8s.io
  namespace: kubernnetes-dashboard
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io

