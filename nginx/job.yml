kind: Job
apiVersion: batch/v1
metadata:
  name: nginx-job
  namespace: nginx
spec:
  completions: 1
  parallelism: 1
  template:
    metadata:
      name: demo-job-pod
      labels:
        app: batch-job
    spec:
      containers:
      - name: batch-container
        image: busybox
        command: ["sh", "-c", "echo", "Hello, World! && sleep"]
      restartPolicy: Never 
