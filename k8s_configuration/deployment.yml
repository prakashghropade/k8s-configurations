kind: Deployment
apiVersin: apps/v1
metadata:
  name: nginx
  labels:
    app: nginx
spec:
  template:
    metadata:
      name: nginx-deployment
      labels:
        app: nginx
    spec:
      containers:
      - image: nginx
        name: nginx-container
        ports:
          containerPort: 80
  replicas: 3
  selector:
    matchLabels:
      app: nginx
