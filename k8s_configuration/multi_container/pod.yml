apiVersion: v1
kind: Pod
metadata:
  name: myapp
  labels:
    name: myapp-pod
spec:
  containers:
  - name: myapp-container
    image: busybox:1.28
    command: ['sh', '-c', 'echo app is running && sleep 36000']
    env:
    - name: FIRSTNAME
      value: "Prakash"
  initContainers:
  - name: init-service
    image: busybox:1.28
    command: ['sh', '-c']
    args: ['until nslookup myservice.default.svc.cluster.local; do echo waiting for the service to be up; sleep 2; done' ]
